version: '3.8'

services:
  # GBLS Literature Reviewer
  # Unified application for corpus exploration, summary review, and article classification
  gbls:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gbls
    ports:
      - "8787:8787"
    environment:
      PORT: 8787
      # Single persistent data root (mirrors the Render disk at /mnt/persistent).
      DATA_DIR: /mnt/persistent
      CORPUS_DIR: ../1_coded_gbls_corpus_articles
      METRICS_DIR: ../2_calculated_metrics
      NODE_ENV: production
      DEBUG_MODE: "true"
    volumes:
      - ./data:/mnt/persistent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
