services:
  - type: web
    name: gbls-literature-reviewer
    runtime: node
    buildCommand: cd site && npm install
    startCommand: cd site && node server.mjs
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DEBUG_MODE
        scope: runtime
        value: "true"
      - key: APP_URL
        fromService:
          type: web
          name: gbls-literature-reviewer
          envVarKey: RENDER_EXTERNAL_URL
      - key: SUBMISSIONS_DIR
        value: /tmp/submissions
      - key: CORPUS_DIR
        value: ./1_coded_gbls_corpus_articles
      - key: METRICS_DIR
        value: ./2_calculated_metrics
      - key: JWT_SECRET
        sync: false

# Note: DATABASE_URL and other sensitive values should be set in Render dashboard
