services:
  - type: web
    name: gbls-literature-reviewer
    runtime: node
    buildCommand: cd site && npm install
    startCommand: cd site && node server.mjs
    # Starter (or higher) is required for a persistent disk.
    plan: starter
    # Persistent disk — all app-created data (users.db + submissions) lives here.
    disk:
      name: gbls-data
      mountPath: /mnt/persistent
      sizeGB: 1
    envVars:
      # Non-secret runtime config. Everything else (paths, port, URLs) is
      # resolved automatically in site/config.mjs — no need to set it here.
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /mnt/persistent

      # Secrets — set values in the Render dashboard; never commit them here.
      - key: JWT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ZOTERO_USER_ID
        sync: false
      - key: ZOTERO_API_KEY
        sync: false
      # - key: RECAPTCHA_SITE_KEY
      #   sync: false
      # - key: RECAPTCHA_SECRET_KEY
      #   sync: false
